      margin-bottom: 3px;

      background: #fef7e0;
      border-radius: 16px;

      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;

      margin: 0 3px;

    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }

    .input-area {

    .input-area input {

      border: 2px solid #4a3b32;

      font-size: 1rem;
      outline: none;
    }

    }
    .input-area button {
      background: #92400e;

      padding: 14px 24px;

    @media (max-width: 500px) {
